<script type="module">
  import { Instanz } from "./instanz-core.js";
  import { mir } from "./mir-core.js";
  import { respo } from "./respo-core.js";
  import { argumenteria } from "./argumenteria-core.js";
  import { erk } from "./erk-core.js";
  import { dir } from "./dir-core.js";
  import { REAL } from "./real-core.js";

  const core = Instanz("ID-NEU", "GATE-A", "SAT-OK", "ANKER-ROOT");

  const impulse = mir("Start");
  const r = respo(core, impulse);
  const a = argumenteria(core, impulse);
  const e = erk(a);
  const d = dir(e);
  const real = REAL(d);

  document.getElementById("out").textContent =
    JSON.stringify({ r, a, e, d, real }, null, 2);
</script>
