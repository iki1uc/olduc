<script>
async function load48() {
  const res = await fetch("48.json");
  const data = await res.json();
  window.PERIUM = data.modules;
}

function pickContent(id) {
  return window.PERIUM.content.find(c => c.id === id);
}

function pickLanguage(id) {
  return window.PERIUM.language.find(l => l.id === id);
}

function pickPerspective(id) {
  return window.PERIUM.perspective.find(p => p.id === id);
}

function renderX4(content, lang, persp) {
  const meta = "Unmögliches minimieren. Mögliches maximieren.";

  document.getElementById("slot1").innerText = content.title;
  document.getElementById("slot2").innerText = lang.label;
  document.getElementById("slot3").innerText = persp.label;
  document.getElementById("slot4").innerText = meta;
}

window.onload = load48;
</script>
