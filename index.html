<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Testcube</title>
  <style>
    body { background:#000; color:#fff; font-family:system-ui; padding:20px; }
    #cubeWrap_test { width:200px; height:200px; margin:40px auto; perspective:800px; }
    .cube { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .4s ease-out; background:#222; }
    .face { position:absolute; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:20px; background:#444; color:#fff; opacity:.9; }
    .face-front  { transform:translateZ(100px); }
    .face-back   { transform:rotateY(180deg) translateZ(100px); }
    .face-right  { transform:rotateY(90deg) translateZ(100px); }
    .face-left   { transform:rotateY(-90deg) translateZ(100px); }
    .face-top    { transform:rotateX(90deg) translateZ(100px); }
    .face-bottom { transform:rotateX(-90deg) translateZ(100px); }
  </style>
</head>
<body>

  <h1>Mini‑Testcube</h1>
  <div id="cubeWrap_test">wird geladen…</div>

  <script src="cube_faces.js"></script>
  <script src="cube_loader.js"></script>
  <script src="seeu_engine.js"></script>
  <script src="clone_cubes_auto.js"></script>

</body>
</html>
