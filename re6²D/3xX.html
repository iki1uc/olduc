<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3×X – MEGA‑ANKER V5.1</title>
<style>
body{background:#000;color:#0f0;font-family:monospace;}
pre{background:#111;padding:12px;white-space:pre-wrap;}
input{width:90%;padding:6px;margin-top:10px;background:#111;border:1px solid #333;color:#0f0;}
.tag{padding:2px 6px;border-radius:4px;margin-left:6px;}
.mech{background:#004400;}
.cmp{background:#333300;}
.time{background:#003344;}
.meta{background:#440044;}
.op{background:#444400;}
.rt{background:#004444;}
.def{background:#440000;}
</style>
</head>
<body>

<h1>3×X – MEGA‑ANKER V5.1</h1>

<input id="inp" placeholder="3×X Eingabe… (z.B. 3x6, 3x4+3x1, TIME-3x10)">

<pre id="out"></pre>

<script>
function interpret3xX(input){
  const D = {
    mech: ["3x6","3x9","PI-3x9","P-3xX"],
    cmp: ["3x4","3x1","parse3x1"],
    time: ["TIME-3x11","TIME-3x10","TIME-3x5"],
    meta: ["3x13","3x12","3x11","3x10"],
    op: ["AXXX","3x3","3x2","3x1"],
    rt: ["AXIS","borgProtocol"]
  };

  const parts = input.split("+").map(s=>s.trim());
  const found = [];

  for(const p of parts){
    let ok = false;
    for(const key in D){
      if(D[key].includes(p)){
        found.push(key);
        ok = true;
      }
    }
    if(!ok){
      return {
        status:"DEFECT",
        tag:"def",
        reason:"UNKNOWN_ELEMENT",
        element:p,
        action:"NEUTRALIZE",
        method:"UNK-PROTO"
      };
    }
  }

  const unique = [...new Set(found)];

  if(unique.length === 1){
    return {
      status:"OK",
      tag:unique[0],
      discipline:unique[0].toUpperCase(),
      messID:unique[0].toUpperCase()+"-ID-X",
      method:unique[0].toUpperCase()+"-PROTO",
      action:"PROCESS"
    };
  }

  return {
    status:"DEFECT",
    tag:"def",
    reason:"MIXED_DISCIPLINES",
    disciplines:unique,
    action:"SEPARATE",
    method:"META-PROTO"
  };
}

document.getElementById("inp").oninput = ()=>{
  const input = inp.value.trim();
  if(!input){ out.textContent = ""; return; }

  const r = interpret3xX(input);

  out.innerHTML =
`=== 3×X – V5.1 ===

Input:
  ${input}

Status:
  ${r.status} <span class="tag ${r.tag}">${r.tag.toUpperCase()}</span>

Disziplin:
  ${r.discipline || "-"}

Mess‑ID:
  ${r.messID || "-"}

Methodik:
  ${r.method || "-"}

Aktion:
  ${r.action}

Details:
${JSON.stringify(r, null, 2)}
`;
};
</script>

</body>
</html>
