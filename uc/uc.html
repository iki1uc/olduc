<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>uc – Vergangenheit</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../core/core_hud.css">
  <style>
    body{
      margin:0;padding:2rem;
      background:#000;color:#fff;
      font-family:system-ui,sans-serif;
      display:flex;align-items:center;justify-content:center;
      text-align:center;
    }
    .wrap{max-width:900px;width:100%}
    .title{font-size:40px;margin-bottom:18px}
    .story{font-size:20px;line-height:1.45;min-height:160px}
    .controls{margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    button{background:#0b1220;color:#7dd3fc;border:1px solid #1f2937;padding:10px 18px;font-size:16px;cursor:pointer}
    a{color:#7dd3fc;text-decoration:none;font-size:15px}
    .meta{margin-top:14px;color:#9ca3af;font-size:13px}
    .small{font-size:16px;color:#9ca3af}
  </style>
</head>
<body>

  <div id="coreHUD"></div>
  <script>
    fetch("../core/core_hud.html")
      .then(r=>r.text())
      .then(h=>{ document.getElementById("coreHUD").innerHTML = h; });
  </script>

  <div class="wrap">
    <div class="title">uc – was war</div>
    <div id="story" class="story"></div>
    <div class="controls">
      <button id="regen">KlicK – neue Variante</button>
      <button id="regenSlow">KlicK mit Pause</button>
      <a href="../1/index.html">Jetzt →</a>
      <a href="../iki/index.html">Zukunft</a>
      <a href="../index.html">Ereignishorizont</a>
    </div>
    <div class="meta small" id="meta"></div>
  </div>

  <script src="../anchor_engine.js"></script>
  <script type="module" src="IQ_3.item.js"></script>

  <script type="module">
    const pageId = "uc";

    const pool = {
      kern:[
        "Es gibt Nächte, die du nie wieder ganz loswirst.",
        "Manche Fehler tragen länger als jede Strafe.",
        "Nicht alles, was vorbei ist, ist wirklich weg."
      ],
      ort:[
        "in einer Küche, in der es immer zu leise war",
        "auf einer Treppe, auf der du zu lange gezögert hast",
        "an einer Kreuzung, die du falsch genommen hast"
      ],
      stimmung:[
        "und du merkst, dass du immer noch dort stehst.",
        "und du fragst dich, ob es anders hätte laufen können.",
        "und du weißt, dass du damals nicht mehr konntest."
      ],
      trichter:[
        "Vergangenheit ist kein Urteil, sondern ein Gewicht.",
        "Du musst sie nicht mögen, aber du trägst sie.",
        "Manche Szenen bleiben, damit du sie nicht wiederholst."
      ]
    };

    function r(a){ return a[Math.floor(Math.random()*a.length)] }

    const storyEl = document.getElementById("story");
    const metaEl  = document.getElementById("meta");

    function buildCombo(){
      return {
        kern: r(pool.kern),
        ort: r(pool.ort),
        stimmung: r(pool.stimmung),
        trichter: r(pool.trichter)
      };
    }

    function render(c){
      storyEl.innerHTML =
        '<div>'+c.kern+'</div><br>'+
        '<div class="small">'+c.ort+' '+c.stimmung+'</div><br>'+
        '<div style="margin-top:6px"><b>'+c.trichter+'</b></div>';
      metaEl.textContent = 'uc • '+new Date().toLocaleTimeString();
    }

    function generate(withPause=true){
      const combo = buildCombo();
      halt("uc_story");
      if(withPause){
        storyEl.innerHTML = '<div class="small" style="opacity:.6">…Vergangenheit sortiert sich</div>';
        setTimeout(()=>render(combo),750);
      } else {
        render(combo);
      }
    }

    document.getElementById("regen").addEventListener("click", ()=>{ halt("uc_click_fast"); generate(false); });
    document.getElementById("regenSlow").addEventListener("click", ()=>{ halt("uc_click_slow"); generate(true); });

    generate(true);
    if(typeof STATION_PRUEFUNG==="function"){ STATION_PRUEFUNG("uc","PI"); }
  </script>

  <script src="../core/core_halt.js"></script>
  <script src="../core/core_navi.js"></script>
  <script src="../core/core_bigcube.js"></script>
  <script src="../core/core_scanner.js">
