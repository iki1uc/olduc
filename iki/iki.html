  <style>

<div id="info">System lädt…</div>

<!-- 128 ANKER -->
<script type="module">
import { ALL4ALL } from "../global/all4all.js";
import { createAnker } from "../global/anker.js";

const grid = document.getElementById("anker-grid");
const info = document.getElementById("info");

const alleAnker = [];

for(let i = 1; i <= 128; i++){
    const a = createAnker("anker_" + i);
    alleAnker.push(a);

    const box = document.createElement("div");
    box.className = "anker-box";
    box.textContent = i;
    box.dataset.id = a.id;
    grid.appendChild(box);

    a.leuchten = function(state){
        this.leuchtet = state;
        box.classList.toggle("on", !!state);
    };
}

ALL4ALL.init(alleAnker);

window.onload = () => {
    info.textContent = "System gestartet – ALL4ALL aktiv";
};
</script>
