<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>uc.html</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#020617;color:#f9fafb;margin:0;padding:2rem}
    h1{font-size:32px}
    .content{max-width:900px;margin:0 auto;line-height:1.6}
    a{color:#7dd3fc;text-decoration:none}
    .note{margin-top:1.5rem;color:#9ca3af;font-size:13px}
    .anchors{margin-top:18px;font-size:14px;color:#9ca3af}
    .spacer{height:120px}
    /* KlicK styles reused */
    #genToggle{position:fixed;right:18px;bottom:18px;background:linear-gradient(135deg,#071025,#0b1a2b);color:#7dd3fc;border-radius:999px;padding:12px 14px;border:2px solid rgba(125,211,252,.12);cursor:pointer;z-index:99999;box-shadow:0 6px 18px rgba(0,0,0,.5);transition:transform .12s ease,background .18s ease}
    #genToggle.colorA{background:linear-gradient(135deg,#07202a,#07384a);border-color:#7dd3fc}
    #genToggle.colorB{background:linear-gradient(135deg,#2a0707,#4a0707);border-color:#ff9b6b}
    #genModal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:99998}
    #genBox{width:92%;max-width:820px;background:rgba(2,6,23,0.96);color:#fff;padding:20px;border-radius:12px;box-shadow:0 18px 50px rgba(0,0,0,.6);transform:translateY(8px);opacity:0;transition:opacity .28s,transform .28s}
    #genBox.visible{opacity:1;transform:none}
    .reveal{opacity:0;transform:scale(.98);transition:transform .14s ease,opacity .14s ease}
    .reveal.visible{transform:scale(1);opacity:1}
    .genControls{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
    .genBtn{background:#071025;color:#7dd3fc;border:1px solid #1f2937;padding:8px 12px;border-radius:8px;cursor:pointer}
    .genSmall{color:#9ca3af;font-size:13px;margin-top:10px;text-align:center}
    #klickStatus{position:fixed;right:18px;bottom:86px;color:#9ca3af;font-size:12px;z-index:99999}
  </style>
</head>
<body>

  <main class="content">
    <h1 id="title">Same Sea of Time</h1>

    <section id="after">
      <p>After the Djinn vanished, both flats shared the same sea of time.</p>
      <p>Both were satisfied. Lighter. Changed. To be continued.</p>
    </section>

    <p class="note">This is a technical demo object. Keep all three files in the same folder for the distributed KlicK to work.</p>

    <nav class="anchors" aria-label="Seitenanker">
      <a href="./1.html">← Back</a> ·
      <a href="#after">Szene</a> ·
      <a href="./iki.html">→ zurück zu iki</a>
    </nav>
  </main>

  <div class="spacer" aria-hidden="true"></div>

  <!-- BEGIN: KlicK Module (uc) -->
  <script>
  (function(){
    const pageId = 'uc';
    const nextId = 'iki';
    const nextUrl = './iki.html';
    const myPool = {
      rolePI:["PI kept the small, stubborn hope that time could be shared.","PI carried a pocket of early mornings that never quite arrived.","PI remembered a lullaby that belonged to two rooms."],
      roleGauner:["The Trickster folded moments like paper and hid them in corners.","The Gauner winked at the sea of time as if it were a joke.","The Gauner moved through the flats like a rumor."],
      places:["by the window that watched the same tide twice","on the landing where footsteps overlapped","in the thin hallway that smelled of salt and old tea"],
      events:["a silence stretched and both rooms listened","a letter appeared on both doormats","the same song started on two different radios"],
      moods:["and it felt like a small, returned mercy.","and a gentle strangeness settled in the corners.","and both held their breath, not sure why."],
      trichter:["What remains is the thing that learns to hold weight.","If it lingers, it becomes part of the shared wall.","Sometimes the echo is the only proof of meeting."],
      weight:1
    };

    try { localStorage.setItem('cube_pool_' + pageId, JSON.stringify(myPool)); localStorage.setItem('cube_pool_last', pageId + '|' + Date.now()); } catch(e){}

    const ACTIVE_KEY = 'cube_active_instance';
    const HIST_KEY = 'cube_history_v1';
    function getActive(){ return localStorage.getItem(ACTIVE_KEY); }
    function setActive(id){ try{ localStorage.setItem(ACTIVE_KEY,id); }catch(e){} }

    if(!document.getElementById('genToggle')){
      const btn = document.createElement('button'); btn.id='genToggle'; btn.textContent='KlicK'; btn.setAttribute('aria-label','KlicK Fortsetzung öffnen'); document.body.appendChild(btn);
    }
    const toggle = document.getElementById('genToggle');
    let status = document.getElementById('klickStatus'); if(!status){ status=document.createElement('div'); status.id='klickStatus'; document.body.appendChild(status); }
    function updateStatus(){ const a=getActive(); status.textContent = a ? 'KlicK aktiv auf: ' + a + (a===pageId ? ' (dieses Fenster)' : '') : 'KlicK: keine aktive Instanz'; toggle.disabled = !!a && a!==pageId; }
    updateStatus();

    const modal = document.createElement('div'); modal.id='genModal';
    modal.innerHTML = '<div id="genBox" role="dialog" aria-modal="true" aria-labelledby="genTitle"><div id="genTitle">Fortsetzung — verpass nie den KlicK</div><div id="genStory" class="reveal">...entspannen</div><div class="genControls"><button class="genBtn" id="genNow">KlicK</button><button class="genBtn" id="genPause">KlicK mit Pause</button><button class="genBtn" id="clearHistory">Clear History</button><button class="genBtn" id="genClose">Schließen</button></div><div class="genSmall" id="genMeta"></div></div>';
    document.body.appendChild(modal);
    const genBox=document.getElementById('genBox'), storyEl=document.getElementById('genStory'), metaEl=document.getElementById('genMeta');

    function r(a){ return a[Math.floor(Math.random()*a.length)] }
    function shuffle(a){ return a.slice().sort(()=>Math.random()-0.5) }
    function loadAllPools(){ const pools=[]; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(!k||!k.startsWith('cube_pool_')) continue; try{ const v=JSON.parse(localStorage.getItem(k)); if(v) pools.push(v); }catch(e){} } return pools; }
    function weightedPick(arr){ const total=arr.reduce((s,x)=>s+(x.weight||1),0); let n=Math.random()*total; for(const x of arr){ n -= (x.weight||1); if(n<=0) return x.pool } return arr[0].pool; }
    function loadHistory(){ try{ return JSON.parse(localStorage.getItem(HIST_KEY)||'[]') }catch(e){ return [] } }
    function saveHistory(h){ localStorage.setItem(HIST_KEY, JSON.stringify(h)) }
    function addToHistory(h){ const H=loadHistory(); H.push(h); if(H.length>500) H.splice(0,H.length-500); saveHistory(H) }
    function seenBefore(h){ return loadHistory().includes(h) }

    function buildCombo(maxAttempts=40){
      for(let attempt=0; attempt<maxAttempts; attempt++){
        const pools = loadAllPools();
        if(pools.length===0){ pools.push({rolePI:["PI is here."],roleGauner:["The Gauner is here."],places:["somewhere"],events:["they meet"],moods:["and it feels like something."],trichter:["If it stays, it has weight."],weight:1}); }
        const weighted = pools.map(p=>({pool:p, weight:p.weight||1}));
        const chosen = weightedPick(weighted);
        const schiene = Math.random()>0.5 ? 'A' : 'B';
        const order = shuffle(['iki','1','uc']).join(' → ');
        const combo = { schiene, order, pi: r(chosen.rolePI||["PI"]), gauner: r(chosen.roleGauner||["Gauner"]), ort: r(chosen.places||["somewhere"]), ereignis: r(chosen.events||["they meet"]), stimmung: r(chosen.moods||["and it feels like something."]), trichter: r(chosen.trichter||["If it stays, it has weight."]) };
        const hash = btoa(JSON.stringify(combo));
        if(!seenBefore(hash)){ addToHistory(hash); return combo; }
      }
      localStorage.removeItem(HIST_KEY);
      return buildCombo(10);
    }

    function render(c){ storyEl.innerHTML = '<div style="font-size:13px;color:#9ca3af;margin-bottom:8px"><b>Reihenfolge</b>: '+c.order+'</div>'+'<div>'+c.pi+'</div><br>'+'<div>'+c.gauner+'</div><br>'+'<div style="color:#9ca3af">'+c.ort+', '+c.ereignis+' '+c.stimmung+'</div><br>'+'<div style="margin-top:6px"><b>'+c.trichter+'</b></div>'; metaEl.textContent = 'Schiene '+c.schiene+' • erzeugt '+new Date().toLocaleTimeString(); storyEl.classList.remove('visible'); void storyEl.offsetWidth; storyEl.classList.add('visible'); toggle.classList.remove('colorA','colorB'); toggle.classList.add(c.schiene==='A' ? 'colorA' : 'colorB'); }

    function generate(withPause=true){ const combo = buildCombo(); storyEl.classList.remove('visible'); if(withPause){ storyEl.innerHTML = '<div style="opacity:.6">...entspannen</div>'; setTimeout(()=> render(combo),750); } else render(combo); }

    document.getElementById('genNow').addEventListener('click', ()=> generate(false));
    document.getElementById('genPause').addEventListener('click', ()=> generate(true));
    document.getElementById('genClose').addEventListener('click', ()=> { genBox.classList.remove('visible'); setTimeout(()=> modal.style.display='none',260); });
    document.getElementById('clearHistory').addEventListener('click', ()=> { localStorage.removeItem(HIST_KEY); metaEl.textContent='History gelöscht'; });

    toggle.addEventListener('dblclick', ()=>{ setActive(nextId); setTimeout(()=> window.location.href = nextUrl, 80); });
    toggle.addEventListener('click', ()=>{ const a=getActive(); if(a && a!==pageId){ toggle.animate([{transform:'scale(1)'},{transform:'scale(.96)'},{transform:'scale(1)'}],{duration:220}); return; } modal.style.display='flex'; setTimeout(()=> genBox.classList.add('visible'),10); generate(true); });

    window.addEventListener('storage', (e)=>{ if(e.key === ACTIVE_KEY) updateStatus(); if(e.key && e.key.startsWith('cube_pool_')) { if(document.getElementById('genMeta')) document.getElementById('genMeta').textContent = 'Pools aktualisiert • ' + new Date().toLocaleTimeString(); } });

    window.addEventListener('keydown', (ev)=> { if(ev.key==='k' || ev.key==='K'){ ev.preventDefault(); const a=getActive(); if(a && a!==pageId){ toggle.animate([{transform:'scale(1)'},{transform:'scale(.96)'},{transform:'scale(1)'}],{duration:220}); return; } modal.style.display='flex'; setTimeout(()=> genBox.classList.add('visible'),10); generate(true); } });

  })();
  </script>
  <!-- END: KlicK Module (uc) -->

</body>
</html>
