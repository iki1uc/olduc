<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>uc</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="symbol">●○</div>
  <nav class="nav">
    <button class="btn" id="btnZacK">◀ ZacK</button>
    <button class="btn" id="btn4ALL">◎ 4ALL</button>
    <button class="btn" id="btnKlicK">▶ KlicK</button>
  </nav>
</header>

<div class="controls">
  <button class="btn" id="genAll">Generiere für alle</button>
  <button class="btn" id="stabilize">Stabilisieren</button>
</div>

<main id="content">
  <p>Control Center Inhalte…</p>
</main>

<!-- großer Würfel -->
<div id="cubeWrap"><div id="cube" class="cube"></div></div>

<script src="remap.js"></script>
<script src="cube_sim.js"></script>
<script>
  document.getElementById('genAll').addEventListener('click', ()=> SEEU.generateComposition('all'));
  document.getElementById('stabilize').addEventListener('click', ()=> {
    // reduce StorySlope and nudge PID to calm cube
    SEEU.setStorySlope?.(0);
    SEEU.setCubePID?.(3.5,0.1,1.0);
  });
</script>
</body>
</html>
